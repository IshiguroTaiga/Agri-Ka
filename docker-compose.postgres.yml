version: '3.8'

services:
  # PostgreSQL Database Container
  postgres_db:
    image: postgres:16-alpine
    container_name: agri_pulse_postgres
    environment:
      POSTGRES_DB: farm_db
      POSTGRES_USER: farm_admin
      POSTGRES_PASSWORD: farm_password_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # Express Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: agri_pulse_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://farm_admin:farm_password_2026@postgres_db:5432/farm_db
    depends_on:
      - postgres_db
    restart: always

  # React Frontend Web App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: agri_pulse_frontend
    ports:
      - "7777:7777"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
